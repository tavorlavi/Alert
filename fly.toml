# fly.toml app configuration file generated for alert-4yvvyq on 2026-04-01T20:10:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'il-alert-timing-dashboard'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
 
[checks]
  [checks.health]
    type = 'http'
    port = 8000
    path = '/api/latest'
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
