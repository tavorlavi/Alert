app = 'il-alert-timing-dashboard'
primary_region = 'fra'

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = 'http'
    port = 8000
    path = '/api/latest'
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
